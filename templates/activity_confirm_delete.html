{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm border-danger">
            <div class="card-header bg-danger text-white">
                <h3 class="mb-0">确认删除</h3>
            </div>
            <div class="card-body">
                <p class="lead">确定要删除活动 <strong>"{{ activity.title }}"</strong> 吗？</p>
                <p class="text-danger">此操作无法撤销，所有相关的报名记录也将被删除。</p>
                
                <div class="d-flex justify-content-end gap-2 mt-4">
                    <a href="{% url 'activities:activity_detail' activity.pk %}" class="btn btn-outline-secondary">取消</a>
                    <form method="post" class="d-inline">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-danger">确认删除</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
