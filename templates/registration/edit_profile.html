{% extends 'base.html' %}

{% block content %}
<style>
    /* 确保所有输入框可见 */
    .profile-form input {
        display: block !important;
        width: 100% !important;
        padding: 0.75rem 1rem !important;
        font-size: 1rem !important;
        font-weight: 400 !important;
        line-height: 1.5 !important;
        color: #212529 !important;
        background-color: #fff !important;
        background-clip: padding-box !important;
        border: 1px solid #ced4da !important;
        border-radius: 0.375rem !important;
        transition: border-color 0.15s ease-in-out, box-shadow 0.15s ease-in-out !important;
        box-sizing: border-box !important;
    }
    
    .profile-form input:focus {
        color: #212529 !important;
        background-color: #fff !important;
        border-color: #86b7fe !important;
        outline: 0 !important;
        box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.25) !important;
    }
</style>
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-lg border-0">
            <div class="card-header bg-gradient-to-r from-[#004ea2] to-[#0066cc] text-white text-center py-4">
                <h3 class="mb-0"><i class="bi bi-user-circle"></i> 完善个人资料</h3>
                <p class="text-white-80 mt-1">请填写以下信息以启用完整功能</p>
            </div>
            <div class="card-body p-5">
                <div class="alert alert-warning mb-4">
                    <i class="bi bi-exclamation-triangle"></i> 
                    <strong>重要：</strong>必须填写所有信息才能报名活动
                </div>
                
                <form method="post" novalidate class="profile-form">
                    {% csrf_token %}
                    
                    {% for field in form %}
                        <div class="mb-4">
                            <label for="{{ field.id_for_label }}" class="form-label fw-semibold">
                                {{ field.label }}{% if field.field.required %}<span class="text-danger">*</span>{% endif %}
                            </label>
                            <input type="text" name="{{ field.name }}" id="{{ field.id_for_label }}" 
                                   class="form-control" {% if field.field.required %}required{% endif %}
                                   {% if field.value %}value="{{ field.value }}"{% endif %}>
                            {% if field.errors %}
                                <div class="text-danger small mt-1">
                                    {% for error in field.errors %}{{ error }}{% endfor %}
                                </div>
                            {% endif %}
                        </div>
                    {% endfor %}
                    
                    <button type="submit" class="btn btn-primary w-100 py-2">
                        <i class="bi bi-save"></i> 保存资料
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
